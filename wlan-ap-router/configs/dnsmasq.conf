#  Edit this file to change DHCP/DNS settings. 

interface=wlan0
bind-interfaces

# Local DNS domain
domain=lab.local
local=/lab.local/
expand-hosts

# DHCP range (lease time: 24h)
dhcp-range=192.168.50.20,192.168.50.150,255.255.255.0,24h

# Default gateway pushed to WLAN clients
dhcp-option=3,192.168.50.1

# DNS server pushed to WLAN clients
dhcp-option=6,192.168.50.1

# Upstream DNS
server=8.8.8.8

# Static DHCP entry for the Pico (mcu.lab.local → 192.168.50.21)
dhcp-host=2c:cf:67:da:92:4f,mcu,192.168.50.21

# Static DNS entry for the backend server (bypasses expand-hosts/DHCP chain)
address=/backend-server.lab.local/192.168.50.92
